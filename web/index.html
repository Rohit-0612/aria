<!doctype html>
<html lang="en" class="aria">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="ARIA — an evidence-grounded clinical pharmacotherapy consultation assistant."
    />
    <title>ARIA · Consultation Ledger</title>

    <!-- Favicon: the ARIA colophon, inlined so it needs no asset request. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23b45e22' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='8.6'/%3E%3Cpath d='M7.9 16.3L12 6.4l4.1 9.9'/%3E%3Cpath d='M9.5 13.1h5'/%3E%3C/svg%3E"
    />

    <!-- Type system: Fraunces (display, optical), Spectral (clinical prose), IBM Plex Mono (instrument labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply theme before paint to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem('aria-theme');
          var dark =
            stored === 'dark' ||
            (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
